AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch alarms + SNS alerts for ECS, RDS, Lambda, ALB

Parameters:
  AlarmEmail:   { Type: String }
  ECSCluster:   { Type: String }
  ECSService:   { Type: String }
  RDSCluster:   { Type: String }
  LambdaName:   { Type: String }
  ALBArn:       { Type: String }
  TargetGroupArn: { Type: String }

Resources:
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: prod-alerts
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlarmEmail

  # ECS CPU
  ECSCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ecs-cpu-high
      AlarmDescription: ECS CPU > 80% for 5 minutes
      Namespace: AWS/ECS
      MetricName: CPUUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSCluster
        - Name: ServiceName
          Value: !Ref ECSService
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: [!Ref AlertTopic]
      OKActions: [!Ref AlertTopic]

  # ECS Memory
  ECSMemoryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ecs-memory-high
      Namespace: AWS/ECS
      MetricName: MemoryUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSCluster
        - Name: ServiceName
          Value: !Ref ECSService
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 85
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: [!Ref AlertTopic]

  # RDS CPU
  RDSCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: rds-cpu-high
      Namespace: AWS/RDS
      MetricName: CPUUtilization
      Dimensions:
        - Name: DBClusterIdentifier
          Value: !Ref RDSCluster
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 90
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: [!Ref AlertTopic]

  # RDS Connections
  RDSConnectionsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: rds-connections-high
      Namespace: AWS/RDS
      MetricName: DatabaseConnections
      Dimensions:
        - Name: DBClusterIdentifier
          Value: !Ref RDSCluster
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 900
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: [!Ref AlertTopic]

  # Lambda Errors
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: lambda-errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref LambdaName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  # ALB 5xx
  ALB5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alb-5xx-errors
      Namespace: AWS/ApplicationELB
      MetricName: HTTPCode_ELB_5XX_Count
      Dimensions:
        - Name: LoadBalancer
          Value: !Ref ALBArn
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  # ALB Target Response Time
  ALBLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alb-high-latency
      Namespace: AWS/ApplicationELB
      MetricName: TargetResponseTime
      Dimensions:
        - Name: LoadBalancer
          Value: !Ref ALBArn
        - Name: TargetGroup
          Value: !Ref TargetGroupArn
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 2
      Threshold: 2.0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: [!Ref AlertTopic]

Outputs:
  AlertTopicArn:
    Value: !Ref AlertTopic
